<!DOCTYPE html>
<html>
<head>
    <title>ThinkPad Game Suite - Made With Gemini and Love</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; padding: 50px; }
        h1 { border-bottom: 2px solid #ff0000; padding-bottom: 10px; color: #fff; letter-spacing: 2px; }
        #menu-container { margin-top: 30px; }
        .menu-item { margin: 15px 0; }
        .game-link { 
            color: #ff0000; 
            text-decoration: none; 
            border: 1px solid #ff0000; 
            padding: 12px 25px; 
            display: inline-block; 
            width: 250px;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .game-link:hover { 
            background: #ff0000; 
            color: #fff; 
            box-shadow: 0 0 15px #ff0000;
            transform: translateX(10px);
        }
        .meta { color: #555; font-size: 0.8rem; margin-top: 50px; }
    </style>
</head>
<body>

    <h1>THINKPAD_SYSTEM_OS // GAMES</h1>
    
    <div id="menu-container">
        </div>

    <div class="meta">SYSTEM STATUS: OPTIMAL | HARDWARE: TRACKPOINT_RED_NUB</div>

    <script>
        // ADD NEW GAMES HERE: Just add the filename to this list!
        const games = [
            { id: "g1.html", name: "TrackPoint Accuracy" },
            { id: "g2.html", name: "Shooting Gallery" },
            { id: "g3.html", name: "Tank Combat" }
        ];

        const container = document.getElementById('menu-container');

        games.forEach((game, index) => {
            const div = document.createElement('div');
            div.className = 'menu-item';
            
            const link = document.createElement('a');
            link.href = game.id;
            link.className = 'game-link';
            link.innerHTML = `[0${index + 1}] ${game.name}`;
            
            div.appendChild(link);
            container.appendChild(div);
        });
    </script>
</body>
</html>
